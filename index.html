<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบข้อมูลสินค้า CK Premium</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Kanit:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#E67E22">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="CK Premium">
    <link rel="apple-touch-icon" href="icon-512.png">

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Service Worker Registered'))
                    .catch(err => console.log('Service Worker Failed', err));
            });
        }
    </script>
</head>

<body>
    <div class="app-container">
        <header class="header blur-backdrop">
            <div class="header-content">
                <div class="logo">
                    <img src="icon-512.png" alt="CK Premium Logo" class="logo-icon-img">
                    <h1>CK Premium <span class="accent-text">Catalogue</span></h1>
                </div>
                <div class="search-container">
                    <svg class="search-icon" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M11 19C15.4183 19 19 15.4183 19 11C19 6.58172 15.4183 3 11 3C6.58172 3 3 6.58172 3 11C3 15.4183 6.58172 19 11 19Z"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                        <path d="M21 21L16.65 16.65" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                            stroke-linejoin="round" />
                    </svg>
                    <input type="text" id="searchInput" placeholder="ค้นหารหัสสินค้า หรือ ชื่อสินค้า...">
                </div>
            </div>
        </header>

        <main class="main-content">
            <div class="controls-bar">
                <div class="results-count">พบสินค้าทั้งหมด <span id="totalItems">0</span> รายการ</div>
                <div class="view-toggle">
                    <button id="grid-view-btn" class="active">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <rect x="3" y="3" width="7" height="7"></rect>
                            <rect x="14" y="3" width="7" height="7"></rect>
                            <rect x="14" y="14" width="7" height="7"></rect>
                            <rect x="3" y="14" width="7" height="7"></rect>
                        </svg>
                    </button>
                    <button id="list-view-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <line x1="8" y1="6" x2="21" y2="6"></line>
                            <line x1="8" y1="12" x2="21" y2="12"></line>
                            <line x1="8" y1="18" x2="21" y2="18"></line>
                            <line x1="3" y1="6" x2="3.01" y2="6"></line>
                            <line x1="3" y1="12" x2="3.01" y2="12"></line>
                            <line x1="3" y1="18" x2="3.01" y2="18"></line>
                        </svg>
                    </button>
                    <button id="syncSheetBtn" class="btn-primary"
                        data-url="https://docs.google.com/spreadsheets/d/1rjKhc3mdidpe-kQpADVdVAUtcaakPaWHyGZffYvPG5w/gviz/tq?tqx=out:csv"
                        style="background:var(--primary); margin-left: 0.5rem;">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <polyline points="23 4 23 10 17 10"></polyline>
                            <polyline points="1 20 1 14 7 14"></polyline>
                            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
                        </svg>
                        อัปเดตข้อมูล (Google Sheet)
                    </button>

                    <button id="export-btn" class="btn-primary">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="7 10 12 15 17 10"></polyline>
                            <line x1="12" y1="15" x2="12" y2="3"></line>
                        </svg>
                        Export
                    </button>
                </div>
            </div>

            <div id="product-container" class="product-grid">
                <!-- Data will be injected here via JS -->
            </div>
        </main>
    </div>

    <!-- Modal for editing/adding image & size -->
    <div id="imageModal" class="modal">
        <div class="modal-content blur-backdrop">
            <div class="modal-header">
                <h2>จัดการข้อมูลสินค้า <span id="modalSku" class="accent-text"></span></h2>
                <span class="close-modal">&times;</span>
            </div>
            <div class="modal-body">
                <div class="input-group">
                    <label
                        style="font-size: 0.85rem; color: var(--text-muted); display:block; margin-bottom: 0.5rem;">ขนาด
                        (กว้างxยาวxสูง)</label>
                    <input type="text" id="sizeInput" placeholder="เช่น 10x15x20 cm">
                </div>
                <div class="input-group">
                    <label
                        style="font-size: 0.85rem; color: var(--text-muted); display:block; margin-bottom: 0.5rem;">URL
                        รูปภาพ</label>
                    <input type="text" id="imageUrlInput" placeholder="https://example.com/image.jpg">
                </div>
                <div class="image-preview" id="imagePreviewContainer">
                    <img id="imagePreview" src="" alt="Preview">
                    <p class="placeholder-text">ตัวอย่างรูปภาพจะแสดงที่นี่</p>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" id="removeImageBtn">ลบรูปภาพ</button>
                <button class="btn-primary" id="saveImageBtn">บันทึกรูปภาพ</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').then(reg => {
                    console.log('SW Registered!', reg);
                }).catch(err => {
                    console.log('SW Registration failed:', err);
                });
            });
        }
    </script>
</body>

</html>
